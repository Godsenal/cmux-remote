<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#0d0f12" />
<link rel="manifest" href="/manifest.json" />
<link rel="apple-touch-icon" href="/icon-192.png" />
<link rel="icon" href="/icon-192.png" />
<title>cmux remote</title>
<style>
  :root {
    --bg: #0d0f12;
    --panel: #14181d;
    --line: #262d36;
    --fg: #d7dee7;
    --dim: #7d8899;
    --accent: #7aa2f7;
    --unread: #9ece6a;
    --danger: #f7768e;
    --safe-b: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; height: 100%; overflow: hidden;
    background: var(--bg); color: var(--fg);
    font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  body { display: flex; flex-direction: column; }

  header {
    display: flex; align-items: center; gap: 10px;
    padding: calc(env(safe-area-inset-top, 0px) + 8px) 12px 8px;
    background: var(--panel); border-bottom: 1px solid var(--line);
    flex: none;
  }
  #title {
    flex: 1; font-size: 13px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #dot { width: 8px; height: 8px; border-radius: 50%; background: var(--danger); flex: none; }
  #dot.on { background: #9ece6a; }
  /* New-tab (surface) button in the header — a terminal in the current workspace. */
  #newtab { flex: none; padding: 5px 10px; font-size: 16px; line-height: 1; }

  button {
    background: #1e242c; color: var(--fg); border: 1px solid var(--line);
    border-radius: 7px; padding: 7px 10px; font-size: 13px;
    font-family: inherit; cursor: pointer;
  }
  button:active { background: #2a323d; }

  /* The screen is a pre-rendered character grid, so a <pre> is the whole renderer.
     cmux returns no ANSI colour, which is why no terminal emulator is needed here. */
  #screen {
    flex: 1; margin: 0; padding: 8px 10px;
    overflow: auto; -webkit-overflow-scrolling: touch;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 13px; line-height: 1.3;
    white-space: pre; tab-size: 8;
  }
  /* Wrap mode: long terminal lines fold to the phone's width at a readable size,
     instead of the whole grid shrinking to fit. Only vertical scrolling. */
  #screen.wrap { white-space: pre-wrap; overflow-wrap: anywhere; word-break: break-word; }

  /* Surface (pane/tab) switcher — only shown when a workspace has more than one. */
  #surfaces {
    display: flex; gap: 5px; padding: 6px 8px; flex: none;
    overflow-x: auto; background: var(--panel); border-bottom: 1px solid var(--line);
  }
  #surfaces button {
    flex: none; padding: 6px 10px; font-size: 12px; max-width: 44vw;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #surfaces button.sel { border-color: var(--accent); color: var(--accent); }

  #keys {
    display: flex; gap: 5px; padding: 6px 8px; flex: none;
    overflow-x: auto; background: var(--panel); border-top: 1px solid var(--line);
  }
  #keys button { flex: none; padding: 8px 11px; font-size: 12px; }
  #keys button.warn { color: var(--danger); }

  #bar {
    display: flex; gap: 6px; padding: 6px 8px calc(6px + var(--safe-b));
    background: var(--panel); border-top: 1px solid var(--line); flex: none;
    align-items: flex-end;
  }
  #input {
    flex: 1; min-width: 0; background: #0a0c0f; color: var(--fg);
    border: 1px solid var(--line); border-radius: 7px; padding: 10px;
    font-family: ui-monospace, Menlo, monospace; font-size: 16px; /* 16px stops iOS zoom */
    resize: none; line-height: 1.4; max-height: 40vh; overflow-y: auto;
  }
  #input:focus { outline: none; border-color: var(--accent); }

  #sidebar {
    position: fixed; inset: 0 auto 0 0; width: min(85vw, 340px); z-index: 20;
    background: var(--panel); border-right: 1px solid var(--line);
    transform: translateX(-100%); transition: transform .2s ease;
    display: flex; flex-direction: column;
    padding-top: env(safe-area-inset-top, 0px);
  }
  #sidebar.open { transform: none; }
  #scrim {
    position: fixed; inset: 0; z-index: 10; background: #000a;
    opacity: 0; pointer-events: none; transition: opacity .2s;
  }
  #scrim.open { opacity: 1; pointer-events: auto; }
  /* New-workspace button — a fresh sidebar workspace in the current repo's directory. */
  #newws { margin: 6px 8px 0; padding: 10px; font-size: 13px; color: var(--accent); border-color: var(--accent); }
  #wslist { flex: 1; overflow: auto; padding: 6px; }
  .ws {
    padding: 8px 6px 8px 12px; border-radius: 8px; cursor: pointer;
    display: flex; align-items: center; gap: 6px;
  }
  .ws-main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
  .ws:active { background: #222933; }
  .ws.sel { background: #1d2733; box-shadow: inset 2px 0 0 var(--accent); }
  /* Per-workspace push toggle: dimmed 🔕 when off (the default), lit 🔔 when on. */
  .bell {
    flex: none; background: none; border: none; padding: 6px 8px;
    font-size: 17px; line-height: 1; opacity: .4; filter: grayscale(1);
  }
  .bell:active { background: #222933; }
  .bell.on { opacity: 1; filter: none; }
  /* Unread activity: a small dot on workspaces that changed while unwatched. */
  .ws .unread {
    flex: none; width: 8px; height: 8px; border-radius: 50%;
    background: var(--unread); box-shadow: 0 0 6px var(--unread);
  }
  .ws .n { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ws .d { font-size: 11px; color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ws .badge { color: var(--accent); font-size: 11px; }
  .shead {
    padding: 12px; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 8px;
  }
  .shead b { flex: 1; font-size: 13px; }

  #pushbar {
    flex: none; padding: 10px 12px calc(10px + var(--safe-b));
    border-top: 1px solid var(--line);
  }
  #pushbar button { width: 100%; }
  /* When notifications are on, the toggle turns off — tint it so "끄기" reads as destructive. */
  #pushbtn.on { color: var(--danger); border-color: var(--danger); }
  #pushnote { font-size: 11px; color: var(--dim); margin-top: 7px; line-height: 1.45; }
  #pushnote.warn { color: #e0af68; }
  #qrbox { margin-top: 10px; text-align: center; }
  #qrimg {
    width: 200px; height: 200px; max-width: 100%;
    background: #fff; border-radius: 10px; padding: 8px;
  }
  #qrnote { font-size: 11px; color: var(--dim); margin-top: 6px; }

  #toast {
    position: fixed; left: 50%; top: calc(env(safe-area-inset-top, 0px) + 56px);
    transform: translate(-50%, -14px); z-index: 30;
    background: #1d2733; border: 1px solid var(--accent); color: var(--fg);
    padding: 9px 14px; border-radius: 9px; font-size: 13px; max-width: 88vw;
    opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s;
  }
  #toast.on { opacity: 1; transform: translate(-50%, 0); }
</style>
</head>
<body>

<header>
  <button id="menu" aria-label="워크스페이스 목록">☰</button>
  <div id="title">연결 중…</div>
  <button id="newtab" aria-label="새 탭">＋</button>
  <div id="dot" aria-label="연결 상태"></div>
</header>

<div id="surfaces" hidden></div>

<pre id="screen"></pre>

<div id="keys">
  <button data-k="esc">esc</button>
  <button data-k="up">↑</button>
  <button data-k="down">↓</button>
  <button data-k="left">←</button>
  <button data-k="right">→</button>
  <button data-k="tab">tab</button>
  <button data-k="enter">⏎</button>
  <button data-k="clear">지우기</button>
  <button data-k="ctrl+c" class="warn">^C</button>
  <button data-k="ctrl+r">^R</button>
</div>

<div id="bar">
  <textarea id="input" rows="1" placeholder="입력 후 전송" autocapitalize="off" autocorrect="off" autocomplete="off" spellcheck="false"></textarea>
  <button id="send">전송</button>
</div>

<div id="scrim"></div>
<aside id="sidebar">
  <div class="shead">
    <b>워크스페이스</b>
    <button id="fit" aria-label="줄바꿈 켜기/끄기">줄바꿈</button>
    <button id="fdec" aria-label="글자 작게">A−</button>
    <button id="finc" aria-label="글자 크게">A+</button>
  </div>
  <button id="newws">＋ 새 워크스페이스</button>
  <div id="wslist"></div>
  <div id="pushbar">
    <button id="pushbtn">알림 켜기</button>
    <div id="pushnote"></div>
    <button id="qrbtn" style="margin-top:8px">다른 기기 연결 (QR)</button>
    <div id="qrbox" hidden>
      <img id="qrimg" alt="이 서버 접속 QR" />
      <div id="qrnote">다른 폰·태블릿의 카메라로 스캔하면 바로 열립니다.</div>
    </div>
  </div>
</aside>

<div id="toast"></div>

<script>
const $ = (s) => document.querySelector(s);
const screenEl = $("#screen"), titleEl = $("#title"), dotEl = $("#dot"), listEl = $("#wslist");
const sidebar = $("#sidebar"), scrim = $("#scrim"), input = $("#input"), toast = $("#toast");
const fitBtn = $("#fit");

let ws = null, current = null, currentSurface = null, workspaces = [], surfaces = [], toastTimer = null;
let notifySet = new Set(); // workspace ids with push turned on (server-authoritative)
let unreadSet = new Set(); // workspace ids with unseen activity (server-authoritative)
let screenText = ""; // full text of the viewed target, kept in sync via deltas
const surfacesEl = $("#surfaces");

// Survives PWA relaunch, where the token is no longer in the URL.
const urlToken = new URLSearchParams(location.search).get("t");
if (urlToken) localStorage.setItem("token", urlToken);
const token = urlToken || localStorage.getItem("token") || "";

let fontSize = Number(localStorage.getItem("fs") || 13);
let wrap = localStorage.getItem("wrap") !== "0"; // wrap by default — readable beats whole-line

function applyFont() {
  screenEl.style.fontSize = fontSize.toFixed(1) + "px";
  screenEl.classList.toggle("wrap", wrap);
  fitBtn.textContent = wrap ? "줄바꿈 ✓" : "줄바꿈";
}

const nudge = (d) => {
  fontSize = Math.max(7, Math.min(28, fontSize + d));
  localStorage.setItem("fs", fontSize);
  applyFont();
};
$("#finc").onclick = () => nudge(1);
$("#fdec").onclick = () => nudge(-1);
fitBtn.onclick = () => {
  wrap = !wrap;
  localStorage.setItem("wrap", wrap ? "1" : "0");
  applyFont();
};
applyFont();

function showToast(text) {
  toast.textContent = text;
  toast.classList.add("on");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove("on"), 4000);
}

const setDrawer = (open) => {
  sidebar.classList.toggle("open", open);
  scrim.classList.toggle("open", open);
};
$("#menu").onclick = () => setDrawer(!sidebar.classList.contains("open"));
scrim.onclick = () => setDrawer(false);

// Edge-swipe to open, swipe to close — the standard mobile drawer gesture, following
// the finger. Opening must start from the left edge so it never steals the terminal's
// own horizontal scroll; closing works anywhere while the drawer is open.
(() => {
  const EDGE = 28; // px from the left edge that arms an opening drag
  const drawerW = () => sidebar.getBoundingClientRect().width || Math.min(innerWidth * 0.85, 340);
  let sx = 0, sy = 0, w = 0, live = false, decided = false, opening = false, pos = 0;

  const freeze = (on) => {
    sidebar.style.transition = scrim.style.transition = on ? "none" : "";
  };
  const clearInline = () => {
    sidebar.style.transform = scrim.style.opacity = scrim.style.pointerEvents = "";
  };

  addEventListener("touchstart", (e) => {
    if (e.touches.length !== 1) return;
    const t = e.touches[0], isOpen = sidebar.classList.contains("open");
    if (!isOpen && t.clientX > EDGE) return; // opening drags only from the edge
    sx = t.clientX; sy = t.clientY; w = drawerW();
    live = true; decided = false; opening = !isOpen;
  }, { passive: true });

  addEventListener("touchmove", (e) => {
    if (!live) return;
    const t = e.touches[0], dx = t.clientX - sx, dy = t.clientY - sy;
    if (!decided) {
      if (Math.abs(dx) < 8 && Math.abs(dy) < 8) return;      // wait until intent is clear
      if (Math.abs(dy) >= Math.abs(dx)) { live = false; return; } // vertical → let it scroll
      decided = true; freeze(true);
    }
    pos = Math.max(-w, Math.min(0, opening ? -w + Math.max(0, dx) : dx)); // -w=closed, 0=open
    sidebar.style.transform = `translateX(${pos}px)`;
    scrim.style.opacity = String(1 + pos / w);
    scrim.style.pointerEvents = "auto";
    e.preventDefault(); // owns the gesture now; stop the screen from scrolling under it
  }, { passive: false });

  const end = () => {
    if (!live) return;
    live = false;
    if (!decided) return;
    freeze(false);
    clearInline();
    setDrawer(pos > -w / 2); // past the halfway point → settle open, else closed
  };
  addEventListener("touchend", end, { passive: true });
  addEventListener("touchcancel", end, { passive: true });
})();

function connect() {
  const proto = location.protocol === "https:" ? "wss" : "ws";
  ws = new WebSocket(`${proto}://${location.host}/ws?t=${encodeURIComponent(token)}`);

  ws.onopen = () => {
    dotEl.classList.add("on");
    const saved = localStorage.getItem("workspace");
    if (saved) subscribe(saved);
  };
  ws.onclose = () => {
    dotEl.classList.remove("on");
    setTimeout(connect, 1200); // the bridge restarts often during development
  };
  ws.onmessage = (e) => handle(JSON.parse(e.data));
}

function handle(m) {
  if (m.type === "screen") {
    if (m.target !== (currentSurface || current)) return;
    if (m.full !== undefined) {
      screenText = m.full;
    } else {
      // Reconstruct from the common prefix/suffix delta the server sent.
      const next = screenText.slice(0, m.p) + m.mid + screenText.slice(screenText.length - m.s);
      if (next.length !== m.len) { // out of sync — ask for a full resend
        ws?.readyState === 1 && ws.send(JSON.stringify({ type: "resync" }));
        return;
      }
      screenText = next;
    }
    paint(screenText);
  } else if (m.type === "surfaces") {
    if (m.workspace !== current) return;
    surfaces = m.surfaces;
    // A surface we were viewing may have closed on the Mac — fall back to focus.
    if (currentSurface && !surfaces.some((s) => s.id === currentSurface)) {
      subscribeSurface(null);
    }
    renderSurfaces();
  } else if (m.type === "workspaces") {
    workspaces = m.workspaces;
    renderList();
    // `ref` (workspace:N) is a positional handle that gets renumbered as workspaces
    // come and go; `id` (uuid) is stable. Subscribe and match by id, or a saved
    // session silently points at the wrong — or an empty — workspace.
    if (!current || !workspaces.some((w) => w.id === current)) {
      const pick = workspaces.find((w) => w.selected) || workspaces[0];
      if (pick) subscribe(pick.id);
    } else {
      const w = workspaces.find((x) => x.id === current);
      if (w) titleEl.textContent = w.title;
    }
  } else if (m.type === "created") {
    // Jump straight into whatever we just created.
    if (m.kind === "workspace" && m.workspace) {
      subscribe(m.workspace);
      showToast("새 워크스페이스를 만들었습니다.");
    } else if (m.kind === "surface" && m.surface && m.workspace === current) {
      subscribeSurface(m.surface);
      showToast("새 탭을 만들었습니다.");
    }
  } else if (m.type === "notify-state") {
    notifySet = new Set(m.workspaces || []);
    renderList();
  } else if (m.type === "unread") {
    unreadSet = new Set(m.workspaces || []);
    renderList();
  } else if (m.type === "notifications") {
    for (const n of m.items) notify(n);
  } else if (m.type === "error") {
    showToast(m.message);
  }
}

function paint(text) {
  // Keep the view pinned to the bottom only if the user was already there.
  const atBottom = screenEl.scrollHeight - screenEl.scrollTop - screenEl.clientHeight < 24;
  const left = screenEl.scrollLeft;
  screenEl.textContent = text;
  screenEl.scrollLeft = left;
  if (atBottom) screenEl.scrollTop = screenEl.scrollHeight;
}

function notify(n) {
  const w = workspaces.find((x) => x.id === n.workspace_id);
  const where = w ? w.title : "cmux";
  const body = `${where} — ${n.body || n.subtitle || ""}`;

  showToast(body);
  if ("Notification" in window && Notification.permission === "granted" && document.hidden) {
    new Notification(n.title || "cmux", { body, tag: n.id });
  }
}

function subscribe(id) {
  current = id;
  unreadSet.delete(id); // opening it clears the badge at once; the server agrees on its next tick
  currentSurface = null; // new workspace → follow its focused surface until told otherwise
  surfaces = [];
  renderSurfaces();
  localStorage.setItem("workspace", id);
  screenText = "";
  screenEl.textContent = "";
  const w = workspaces.find((x) => x.id === id);
  titleEl.textContent = w ? w.title : "…";
  renderList();
  ws?.readyState === 1 && ws.send(JSON.stringify({ type: "subscribe", workspace: id }));
  setDrawer(false);
}

// Narrow to one surface (a pane/tab) within the current workspace, or null for its focus.
function subscribeSurface(sid) {
  currentSurface = sid;
  screenText = "";
  screenEl.textContent = "";
  renderSurfaces();
  ws?.readyState === 1 && ws.send(JSON.stringify({ type: "subscribe", workspace: current, surface: sid }));
}

function renderSurfaces() {
  // Only worth showing when a workspace is actually split into more than one surface.
  if (surfaces.length < 2) {
    surfacesEl.hidden = true;
    surfacesEl.innerHTML = "";
    return;
  }
  surfacesEl.hidden = false;
  surfacesEl.innerHTML = "";
  surfaces.forEach((s, i) => {
    const b = document.createElement("button");
    const active = currentSurface ? s.id === currentSurface : s.focused;
    b.className = active ? "sel" : "";
    const label = (s.title || `${s.type} ${i + 1}`).replace(/^.*[@:]/, "").slice(0, 22) || `#${i + 1}`;
    b.textContent = label;
    b.onclick = () => subscribeSurface(s.id);
    surfacesEl.append(b);
  });
}

function renderList() {
  listEl.innerHTML = "";
  for (const w of workspaces) {
    const el = document.createElement("div");
    el.className = "ws" + (w.id === current ? " sel" : "");
    el.onclick = () => subscribe(w.id);

    const dir = (w.current_directory || "").replace(/^\/Users\/[^/]+/, "~");
    const main = document.createElement("div");
    main.className = "ws-main";
    main.innerHTML =
      `<div class="n">${esc(w.title)}</div>` +
      `<div class="d">${esc(dir)}${w.selected ? ' <span class="badge">· 맥에서 열림</span>' : ""}</div>`;

    // Per-workspace push toggle. Off by default; tapping doesn't switch workspace.
    const on = notifySet.has(w.id);
    const bell = document.createElement("button");
    bell.className = "bell" + (on ? " on" : "");
    bell.textContent = on ? "🔔" : "🔕";
    bell.setAttribute("aria-label", on ? "이 워크스페이스 알림 끄기" : "이 워크스페이스 알림 켜기");
    bell.onclick = (e) => {
      e.stopPropagation();
      if (ws?.readyState === 1) ws.send(JSON.stringify({ type: "notify-toggle", workspace: w.id, on: !on }));
    };

    // Unread activity dot — server marks a workspace unread when its screen moves
    // while unwatched; never for the one we're viewing.
    if (unreadSet.has(w.id) && w.id !== current) {
      const dot = document.createElement("span");
      dot.className = "unread";
      dot.setAttribute("aria-label", "읽지 않은 활동");
      el.append(main, dot, bell);
    } else {
      el.append(main, bell);
    }
    listEl.append(el);
  }
}

const esc = (s) =>
  String(s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

const sendKey = (k) => ws?.readyState === 1 && ws.send(JSON.stringify({ type: "key", key: k }));

function autoGrow() {
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, window.innerHeight * 0.4) + "px";
}

function sendText() {
  const text = input.value;
  if (!text || ws?.readyState !== 1) return;
  ws.send(JSON.stringify({ type: "send", text }));
  ws.send(JSON.stringify({ type: "key", key: "enter" }));
  input.value = "";
  autoGrow();
}

for (const b of document.querySelectorAll("#keys button")) {
  b.onclick = () => sendKey(b.dataset.k);
}
$("#send").onclick = sendText;
input.addEventListener("input", autoGrow);

// Create a new terminal ("tab") in the current workspace, or a whole new workspace.
// The server replies with a `created` message carrying the new id to jump to.
$("#newtab").onclick = () => {
  if (!current || ws?.readyState !== 1) return;
  ws.send(JSON.stringify({ type: "new-surface" }));
};
$("#newws").onclick = () => {
  if (ws?.readyState !== 1) return;
  ws.send(JSON.stringify({ type: "new-workspace" }));
};

// --- push -----------------------------------------------------------------

const VAPID_PUBLIC_KEY = "__VAPID_PUBLIC_KEY__";
const pushBtn = $("#pushbtn"), pushNote = $("#pushnote");

const urlB64ToBytes = (b64) => {
  const padded = (b64 + "=".repeat((4 - (b64.length % 4)) % 4)).replace(/-/g, "+").replace(/_/g, "/");
  return Uint8Array.from(atob(padded), (c) => c.charCodeAt(0));
};

const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
  (navigator.userAgent.includes("Mac") && "ontouchend" in document);
const installed = matchMedia("(display-mode: standalone)").matches || navigator.standalone === true;

/** iOS refuses push unless the page is a secure context AND launched from the home screen. */
function pushBlocker() {
  if (!window.isSecureContext)
    return "HTTPS가 아니라 푸시를 쓸 수 없습니다. Tailscale HTTPS 주소로 열어주세요.";
  if (isIOS && !installed)
    return "iOS는 홈 화면에 추가한 앱에서만 푸시가 됩니다. 공유 → 홈 화면에 추가 후, 그 아이콘으로 여세요.";
  if (!("serviceWorker" in navigator) || !("PushManager" in window))
    return "이 브라우저는 웹 푸시를 지원하지 않습니다.";
  return null;
}

async function refreshPushUI() {
  const blocker = pushBlocker();
  if (blocker) {
    pushBtn.disabled = true;
    pushBtn.textContent = "알림 사용 불가";
    pushBtn.classList.remove("on");
    pushNote.className = "warn";
    pushNote.textContent = blocker;
    return;
  }

  const reg = await navigator.serviceWorker.ready;
  const sub = await reg.pushManager.getSubscription();
  const on = !!sub && Notification.permission === "granted";

  pushBtn.disabled = false;
  pushBtn.textContent = on ? "알림 끄기" : "알림 켜기";
  pushBtn.classList.toggle("on", on);
  pushNote.className = "";
  pushNote.textContent = on
    ? "이 기기 알림 켜짐 — 목록에서 🔔 켠 워크스페이스만 폰으로 알립니다."
    : "먼저 이 기기의 알림을 켠 뒤, 워크스페이스별로 🔔를 켜세요.";
}

// The main button toggles push: subscribe when off, unsubscribe when on.
pushBtn.onclick = async () => {
  try {
    const reg = await navigator.serviceWorker.ready;
    const existing = await reg.pushManager.getSubscription();

    if (existing) {
      // Turn OFF: drop it on the server first, then release the browser subscription.
      await fetch("/push/unsubscribe", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ endpoint: existing.endpoint }),
      });
      await existing.unsubscribe();
      showToast("알림을 껐습니다.");
    } else {
      // Turn ON: ask permission, subscribe, register with the server.
      if ((await Notification.requestPermission()) !== "granted") {
        pushNote.className = "warn";
        pushNote.textContent = "알림 권한이 거부됐습니다. iOS 설정 → 알림에서 허용해주세요.";
        return;
      }
      const sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlB64ToBytes(VAPID_PUBLIC_KEY),
      });
      await fetch("/push/subscribe", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify(sub),
      });
      showToast("알림을 켰습니다.");
    }
  } catch (err) {
    pushNote.className = "warn";
    pushNote.textContent = "알림 설정 실패: " + err;
  }
  refreshPushUI();
};

navigator.serviceWorker?.addEventListener("message", (e) => {
  if (e.data?.type === "open-workspace" && e.data.workspace) subscribe(e.data.workspace);
});

// "Connect another device": lazy-load the server-rendered QR of this origin.
const qrBtn = $("#qrbtn"), qrBox = $("#qrbox"), qrImg = $("#qrimg");
qrBtn.onclick = () => {
  const show = qrBox.hidden;
  qrBox.hidden = !show;
  qrBtn.textContent = show ? "QR 숨기기" : "다른 기기 연결 (QR)";
  if (show && !qrImg.src) qrImg.src = "/qr.svg";
};

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js").then(refreshPushUI).catch(() => refreshPushUI());
} else {
  refreshPushUI();
}

// Tapping a notification deep-links straight to the workspace that fired it.
const deepLink = new URLSearchParams(location.search).get("ws");
if (deepLink) localStorage.setItem("workspace", deepLink);

connect();
</script>
